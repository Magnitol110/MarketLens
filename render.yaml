services:
  - type: web
    name: marketlens-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements-backend.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: MARKETLENS_CORS_ORIGINS
        sync: false
